<header class="w3-container" style="padding-top:22px">
    <h5><b><i class="fa fa-dashboard"></i> Venue</b></h5>
</header>
<br>
<div class="w3-responsive w3-card-4 w3-margin">
    <table class="w3-table w3-striped w3-bordered">
        <thead>
        <tr class="w3-theme">
            <th>Venue Name</th>
            <th>Table(s)</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            {% if venue %}
            <td><a href="{{ url_for('venue.update', Venue_ID=venue.id) }}">{{ venue.name }}</a></td>
            <td>{{ venue.pooltables|length }}</td>
            {% endif %}
        </tr>
        </tbody>
    </table>
</div>
